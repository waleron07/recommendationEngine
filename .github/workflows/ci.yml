name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, architecture, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # Guards the promises prose cannot keep: zero-dep core, leftward
      # dependencies, no Node API in core. See scripts/check-arch.mjs.
      - run: pnpm check:arch
      - run: pnpm build
      - run: pnpm test

  # ARCHITECTURE.md §23.5 claims @recoengine/core runs on Node, Bun, Deno and in
  # the browser. A claim that is not exercised is a claim that quietly stops being
  # true, so every server runtime named in the doc gets a row here; the browser gets
  # its own job below (it needs Chromium, which the others do not).
  runtimes:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: 'Node 20', runtime: node, version: '20' }
          - { name: 'Node 22', runtime: node, version: '22' }
          - { name: 'Node 24', runtime: node, version: '24' }
          - { name: 'Bun', runtime: bun }
          - { name: 'Deno', runtime: deno }
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.version || '20' }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
      - if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Import the built core and assert it loaded
        run: ${{ matrix.runtime }} scripts/smoke.mjs

  # The browser half of the §23.5 isomorphism claim. A stray node:* import or an
  # export-map typo the server runtimes tolerate can still break a browser, so the built
  # core is loaded as a <script type="module"> in headless Chromium and put through the
  # same checks. Playwright is installed ephemerally here rather than added to the repo's
  # manifest, so the lockfile the other jobs pin stays untouched.
  browser:
    name: Browser (headless Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install Playwright Chromium (ephemeral, not in the repo manifest)
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Load the built core in a headless browser and assert it works
        run: node scripts/smoke-browser.mjs
